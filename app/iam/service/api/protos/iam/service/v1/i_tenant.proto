syntax = "proto3";

package iam.service.v1;

import "authz/service/v1/authz.proto";
import "google/api/annotations.proto";
import "tenant/service/v1/tenant.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

service TenantService {
  rpc CreateTenant(tenant.service.v1.CreateTenantRequest) returns (tenant.service.v1.CreateTenantResponse) {
    option (google.api.http) = {
      post: "/v1/tenants"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc GetTenant(tenant.service.v1.GetTenantRequest) returns (tenant.service.v1.GetTenantResponse) {
    option (google.api.http) = {get: "/v1/tenants/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_VIEW
      id_field: "id"
    };
  }

  rpc ListTenants(tenant.service.v1.ListTenantsRequest) returns (tenant.service.v1.ListTenantsResponse) {
    option (google.api.http) = {get: "/v1/tenants"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc UpdateTenant(tenant.service.v1.UpdateTenantRequest) returns (tenant.service.v1.UpdateTenantResponse) {
    option (google.api.http) = {
      put: "/v1/tenants/{id}"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
      id_field: "id"
    };
  }

  rpc DeleteTenant(tenant.service.v1.DeleteTenantRequest) returns (tenant.service.v1.DeleteTenantResponse) {
    option (google.api.http) = {delete: "/v1/tenants/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
      id_field: "id"
    };
  }

  rpc TransferOwnership(tenant.service.v1.TransferTenantOwnershipRequest) returns (tenant.service.v1.TransferTenantOwnershipResponse) {
    option (google.api.http) = {
      post: "/v1/tenants/{tenant_id}/transfer-ownership"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
      id_field: "tenant_id"
    };
  }
}
