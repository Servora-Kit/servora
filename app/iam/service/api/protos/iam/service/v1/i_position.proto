syntax = "proto3";

package iam.service.v1;

import "google/api/annotations.proto";
import "authz/service/v1/authz.proto";
import "position/service/v1/position.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/iam/service/v1;iampb";

// PositionService manages positions within a tenant's organizational structure.
service PositionService {
  rpc ListPositions(position.service.v1.ListPositionsRequest)
      returns (position.service.v1.ListPositionsResponse) {
    option (google.api.http) = {get: "/v1/positions"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc GetPosition(position.service.v1.GetPositionRequest)
      returns (position.service.v1.GetPositionResponse) {
    option (google.api.http) = {get: "/v1/positions/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_NONE
    };
  }

  rpc CreatePosition(position.service.v1.CreatePositionRequest)
      returns (position.service.v1.CreatePositionResponse) {
    option (google.api.http) = {
      post: "/v1/positions"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }

  rpc UpdatePosition(position.service.v1.UpdatePositionRequest)
      returns (position.service.v1.UpdatePositionResponse) {
    option (google.api.http) = {
      put: "/v1/positions/{id}"
      body: "*"
    };
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }

  rpc DeletePosition(position.service.v1.DeletePositionRequest)
      returns (position.service.v1.DeletePositionResponse) {
    option (google.api.http) = {delete: "/v1/positions/{id}"};
    option (authz.service.v1.rule) = {
      mode: AUTHZ_MODE_OBJECT
      object_type: OBJECT_TYPE_TENANT
      relation: RELATION_CAN_MANAGE
    };
  }
}
