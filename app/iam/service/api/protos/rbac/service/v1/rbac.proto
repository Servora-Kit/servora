syntax = "proto3";

package rbac.service.v1;

import "google/protobuf/timestamp.proto";
import "pagination/v1/pagination.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/rbac/service/v1;rbacpb";

// ──────────────────────────────
// Role
// ──────────────────────────────

message RoleInfo {
  string id = 1;
  string code = 2;
  string name = 3;
  optional string description = 4;
  // BUILTIN or CUSTOM
  string type = 5;
  bool is_protected = 6;
  // ACTIVE or DISABLED
  string status = 7;
  optional string tenant_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  // IDs of permissions assigned to this role
  repeated string permission_ids = 11;
}

message ListRolesRequest {
  optional string tenant_id = 1;
  pagination.v1.PaginationRequest pagination = 2;
}

message ListRolesResponse {
  repeated RoleInfo roles = 1;
  pagination.v1.PaginationResponse pagination = 2;
}

message GetRoleRequest {
  string id = 1;
}

message GetRoleResponse {
  RoleInfo role = 1;
}

message CreateRoleRequest {
  string code = 1;
  string name = 2;
  optional string description = 3;
  optional string tenant_id = 4;
  repeated string permission_ids = 5;
}

message CreateRoleResponse {
  RoleInfo role = 1;
}

message UpdateRoleRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string status = 4;
  repeated string permission_ids = 5;
}

message UpdateRoleResponse {
  RoleInfo role = 1;
}

message DeleteRoleRequest {
  string id = 1;
}

message DeleteRoleResponse {}

// ──────────────────────────────
// Permission Group
// ──────────────────────────────

message PermissionGroupInfo {
  string id = 1;
  string name = 2;
  optional string module = 3;
  optional string parent_id = 4;
  int32 sort = 5;
  repeated PermissionGroupInfo children = 6;
}

// ──────────────────────────────
// Permission
// ──────────────────────────────

message PermissionInfo {
  string id = 1;
  string code = 2;
  string name = 3;
  optional string description = 4;
  optional string group_id = 5;
  optional string group_name = 6;
  // ACTIVE or DISABLED
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  // API endpoints associated with this permission (metadata only)
  repeated PermissionApiInfo apis = 9;
}

message PermissionApiInfo {
  string api_method = 1;
  string api_path = 2;
}

message ListPermissionsRequest {
  optional string group_id = 1;
  pagination.v1.PaginationRequest pagination = 2;
}

message ListPermissionsResponse {
  repeated PermissionInfo permissions = 1;
  pagination.v1.PaginationResponse pagination = 2;
}

message GetPermissionRequest {
  string id = 1;
}

message GetPermissionResponse {
  PermissionInfo permission = 1;
}

message CreatePermissionRequest {
  string code = 1;
  string name = 2;
  optional string description = 3;
  optional string group_id = 4;
}

message CreatePermissionResponse {
  PermissionInfo permission = 1;
}

message UpdatePermissionRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string status = 4;
}

message UpdatePermissionResponse {
  PermissionInfo permission = 1;
}

message DeletePermissionRequest {
  string id = 1;
}

message DeletePermissionResponse {}

message ListPermissionGroupsRequest {}

message ListPermissionGroupsResponse {
  repeated PermissionGroupInfo groups = 1;
}

// ──────────────────────────────
// Menu
// ──────────────────────────────

message MenuInfo {
  string id = 1;
  // CATALOG, MENU, or BUTTON
  string type = 2;
  string name = 3;
  optional string path = 4;
  optional string component = 5;
  optional string redirect = 6;
  // JSON blob: icon, order, hideInMenu, etc.
  optional string meta = 7;
  optional string parent_id = 8;
  int32 sort = 9;
  // ACTIVE or DISABLED
  string status = 10;
  repeated MenuInfo children = 11;
}

message ListMenusRequest {
  optional string parent_id = 1;
}

message ListMenusResponse {
  repeated MenuInfo menus = 1;
}

message GetMenuRequest {
  string id = 1;
}

message GetMenuResponse {
  MenuInfo menu = 1;
}

message CreateMenuRequest {
  string type = 1;
  string name = 2;
  optional string path = 3;
  optional string component = 4;
  optional string redirect = 5;
  optional string meta = 6;
  optional string parent_id = 7;
  int32 sort = 8;
}

message CreateMenuResponse {
  MenuInfo menu = 1;
}

message UpdateMenuRequest {
  string id = 1;
  optional string name = 2;
  optional string path = 3;
  optional string component = 4;
  optional string redirect = 5;
  optional string meta = 6;
  optional string parent_id = 7;
  optional int32 sort = 8;
  optional string status = 9;
}

message UpdateMenuResponse {
  MenuInfo menu = 1;
}

message DeleteMenuRequest {
  string id = 1;
}

message DeleteMenuResponse {}

// ──────────────────────────────
// Portal (user-facing)
// ──────────────────────────────

message GetMyPermissionCodesRequest {}

message GetMyPermissionCodesResponse {
  repeated string codes = 1;
}

message GetNavigationRequest {}

message GetNavigationResponse {
  repeated MenuInfo menus = 1;
}
