name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit passed CI on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag commit $GITHUB_SHA is not contained in origin/main." >&2
            echo "Push the commit to main before creating a release tag." >&2
            exit 1
          fi

          RUN_COUNT=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs" \
            -f branch=main \
            -f event=push \
            -f per_page=100 \
            --jq ".workflow_runs | map(select(.head_sha == \"${GITHUB_SHA}\" and .conclusion == \"success\")) | length")

          if [ "$RUN_COUNT" = "0" ]; then
            echo "No successful CI run found for $GITHUB_SHA on main." >&2
            echo "Push the commit to main and wait for CI before tagging." >&2
            exit 1
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            BODY=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            {
              echo "body<<CHANGELOG_EOF"
              echo "$BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: true
