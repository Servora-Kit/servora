name: Buf CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "**.proto"
      - "**/buf.yaml"
      - "**/buf.lock"
  pull_request:
    branches: [main]
    paths:
      - "**.proto"
      - "**/buf.yaml"
      - "**/buf.lock"
  delete:
  workflow_dispatch:

concurrency:
  group: buf-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          push_disable_create: true
