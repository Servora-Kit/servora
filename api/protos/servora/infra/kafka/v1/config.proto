syntax = "proto3";

package servora.infra.kafka.v1;

import "google/protobuf/duration.proto";
import "servora/conf/v1/annotations.proto";
import "servora/security/tls/v1/config.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/infra/kafka/v1;kafkapb";

message Kafka {
  option (servora.conf.v1.section) = {
    key: "kafka"
    optional: true
  };

  repeated string brokers = 1 [(servora.conf.v1.field) = {required: true}];
  string client_id = 2;
  string consumer_group = 3;
  int32 required_acks = 4;
  int32 retry_max = 5 [(servora.conf.v1.field) = {default: "3"}];
  google.protobuf.Duration retry_backoff = 6;
  google.protobuf.Duration dial_timeout = 7;
  google.protobuf.Duration read_timeout = 8;
  google.protobuf.Duration write_timeout = 9;
  string compression = 10 [(servora.conf.v1.field) = {default: "none"}];
  servora.security.tls.v1.TLS tls = 11;

  // SASL 认证配置（可选）。
  message SASL {
    string mechanism = 1;
    string username = 2;
    string password = 3;
  }
  SASL sasl = 12;
}
