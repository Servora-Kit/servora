syntax = "proto3";

package servora.core.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "servora/conf/v1/annotations.proto";
import "servora/security/tls/v1/config.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/core/v1;corev1";

// =============================================================================
// Bootstrap 启动必读配置
// 缺失任一非可选字段时 framework 不应启动。
// 辅助配置（broker / audit / cors / mail / jwt）已迁出 extra/<域>/v1/，
// 业务通过 bootstrap.Scan 按需加载。
// =============================================================================

message Bootstrap {
  App app = 1;
  Server server = 2;
  Data data = 3;
  Registry registry = 4;
  Source source = 5;
  Observability obs = 6;
}

// 通信服务端配置
message Server {
  // 监听配置（面向 net.Listen 参数）
  message Listen {
    string network = 1 [(servora.conf.v1.field) = {default: "tcp"}];
    string addr = 2 [(servora.conf.v1.field) = {required: true}];
    google.protobuf.Duration timeout = 3;
  }

  // 服务注册端点覆盖（用于注册中心对外公布地址）
  message Advertise {
    string endpoint = 1;
    string host = 2;
  }

  message HTTP {
    Listen listen = 1;
    servora.security.tls.v1.TLS tls = 2;
    Advertise advertise = 3;
  }

  message GRPC {
    Listen listen = 1;
    servora.security.tls.v1.TLS tls = 2;
    Advertise advertise = 3;
  }

  HTTP http = 1;
  GRPC grpc = 2;
}

// 数据源配置（仅保留 database / client 等核心数据源）
message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }

  message Client {
    message Service {
      string name = 1;
      repeated Endpoint endpoints = 2;
    }
    message Endpoint {
      string protocol = 1;
      string endpoint = 2;
      google.protobuf.Duration timeout = 3;
      servora.security.tls.v1.TLS tls = 4;
      google.protobuf.Struct options = 5;
    }
    repeated Service services = 1;
  }

  Database database = 1;
  Client client = 3;
}

// 应用基础配置（剥离 jwt / audit / mail，由 extra/<域>/v1 持有）
message App {
  string env = 1;
  string name = 2;
  string version = 3;
  // field 5 reserved (was App.Log, moved to Bootstrap.obs.log)
  map<string, string> metadata = 6;
  string external_url = 8;
}

// 注册中心配置
message Registry {
  oneof registry {
    Consul consul = 1;
    Etcd etcd = 2;
    Nacos nacos = 3;
    Kubernetes kubernetes = 4;
  }
}

// 配置中心配置
message Source {
  oneof source {
    Consul consul = 1;
    Etcd etcd = 2;
    Nacos nacos = 3;
  }
}

// 通用 Consul 配置
message Consul {
  string addr = 1;
  string scheme = 2;
  string token = 3;
  string datacenter = 4;
  google.protobuf.Duration timeout = 5;
  repeated string tags = 6;
  string key = 7;
}

// 通用 Etcd 配置
message Etcd {
  repeated string endpoints = 1;
  string username = 2;
  string password = 3;
  google.protobuf.Duration timeout = 4;
  string key = 5;
  string namespace = 6;
}

// 通用 Nacos 配置
message Nacos {
  string addr = 1;
  uint64 port = 2;
  string namespace = 3;
  string group = 4;
  string username = 5;
  string password = 6;
  google.protobuf.Duration timeout = 7;
  string data_id = 8;
}

// 通用 Kubernetes 配置
message Kubernetes {
  bool enable = 1;
}

// 可观测性配置
message Observability {
  Log log = 1;
  Trace trace = 2;
  Metrics metrics = 3;
}

// 链路追踪配置
message Trace {
  string endpoint = 1;
  bool insecure = 2;
  double sampling_ratio = 3;
  string ca_path = 4;
}

// Metrics 配置
message Metrics {
  bool enable = 1;
}

// 日志配置（与 App 同级，所有 message/enum nested）
message Log {
  LogLevel level = 1;
  repeated LogBackend backends = 2;

  message LogBackend {
    oneof backend {
      StdoutBackend stdout = 1;
      FileBackend file = 2;
      OtelBackend otel = 3;
      NoopBackend noop = 4;
    }
  }

  message StdoutBackend {
    LogFormat format = 1;
  }

  message FileBackend {
    string path = 1 [(servora.conf.v1.field) = {required: true}];
    int32 max_size = 2 [(servora.conf.v1.field) = {default: "100"}];
    int32 max_backups = 3;
    int32 max_age = 4;
    bool compress = 5;
    LogFormat format = 6;
  }

  message OtelBackend {
    string endpoint = 1 [(servora.conf.v1.field) = {required: true}];
    OtelProtocol protocol = 2;
    bool insecure = 3;
  }

  message NoopBackend {}

  enum LogLevel {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_DEBUG = 1;
    LOG_LEVEL_INFO = 2;
    LOG_LEVEL_WARN = 3;
    LOG_LEVEL_ERROR = 4;
  }

  enum LogFormat {
    LOG_FORMAT_UNSPECIFIED = 0;
    LOG_FORMAT_JSON = 1;
    LOG_FORMAT_TEXT = 2;
  }

  enum OtelProtocol {
    OTEL_PROTOCOL_UNSPECIFIED = 0;
    OTEL_PROTOCOL_GRPC = 1;
    OTEL_PROTOCOL_HTTP_PROTOBUF = 2;
  }
}
