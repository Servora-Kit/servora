syntax = "proto3";

// 灯塔示例：综合演示 authn / authz / audit 三个注解的「服务级默认 + 方法级覆盖」语义。
// 本文件不实现任何业务逻辑，仅作为 schema 演示与生成产物的回归基线。
//
// 演示矩阵：
//   - SayHello    : 全部继承服务级默认（authn=REQUIRED jwt / authz=CHECK greeting:user / audit=ENABLED）
//   - Healthz     : 三注解都显式覆盖为 OFF（PUBLIC / NONE / DISABLED）
//   - AdminPurge  : authn 显式覆盖为 mTLS（REQUIRED + schemes=["mtls"]），authz/audit 继承默认
package servora.example.v1;

import "servora/audit/v1/annotations.proto";
import "servora/audit/v1/audit.proto";
import "servora/authn/v1/annotations.proto";
import "servora/authz/v1/authz.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/example/v1;examplev1";

// GreetingService 是灯塔示例服务，声明三注解服务级默认并通过两个方法演示覆盖语义。
service GreetingService {
  // authn 服务级默认：要求 JWT 认证。
  option (servora.authn.v1.service_default) = {
    mode: MODE_REQUIRED
    schemes: ["jwt"]
  };

  // authz 服务级默认：对 greeting 资源做 user 关系的 OpenFGA 检查。
  option (servora.authz.v1.service_default) = {
    mode: AUTHZ_MODE_CHECK
    relation: "user"
    object_type: "greeting"
  };

  // audit 服务级默认：开启资源变更类审计。
  option (servora.audit.v1.service_default) = {
    mode: AUDIT_MODE_ENABLED
    event_type: AUDIT_EVENT_TYPE_RESOURCE_MUTATION
  };

  // SayHello 不写任何方法级注解，三注解全部继承服务级默认。
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse) {}

  // Healthz 显式覆盖为 OFF：authn=PUBLIC、authz=NONE、audit=DISABLED。
  rpc Healthz(HealthzRequest) returns (HealthzResponse) {
    option (servora.authn.v1.rule) = {mode: MODE_PUBLIC};
    option (servora.authz.v1.rule) = {mode: AUTHZ_MODE_NONE};
    option (servora.audit.v1.audit_rule) = {mode: AUDIT_MODE_DISABLED};
  }

  // AdminPurge 仅覆盖 authn 为 mTLS；authz 与 audit 继承服务级默认。
  rpc AdminPurge(AdminPurgeRequest) returns (AdminPurgeResponse) {
    option (servora.authn.v1.rule) = {
      mode: MODE_REQUIRED
      schemes: ["mtls"]
    };
  }
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string greeting = 1;
}

message HealthzRequest {}

message HealthzResponse {
  string status = 1;
}

message AdminPurgeRequest {
  string id = 1;
}

message AdminPurgeResponse {
  bool ok = 1;
}
