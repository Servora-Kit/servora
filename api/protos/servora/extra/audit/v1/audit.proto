syntax = "proto3";

package servora.extra.audit.v1;

import "servora/conf/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/extra/audit/v1;auditv1";

// =============================================================================
// 审计 emitter 配置（audit section）
// 控制 pkg/audit 的 Emitter 类型与目标。消费端（ClickHouse 等）配置由
// servora-platform/audit service 自家 proto 持有，不在 framework 中。
// =============================================================================

// AuditContract 仅承载 framework 侧 audit 注入所需契约字段。
// 该 section 非 optional：业务一旦启用 audit middleware，必须显式提供。
message AuditContract {
  option (servora.conf.v1.section) = {key: "audit"};

  bool enabled = 1;
  string emitter_type = 2 [(servora.conf.v1.field) = {default: "noop"}];
  string topic = 3 [(servora.conf.v1.field) = {default: "servora.audit.events"}];
  string service_name = 4;
}
