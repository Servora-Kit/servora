syntax = "proto3";

package servora.extra.mail.v1;

import "google/protobuf/duration.proto";
import "servora/conf/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/extra/mail/v1;mailv1";

// =============================================================================
// 邮件配置（mail section，IAM 兼容保留）
// =============================================================================

message Mail {
  option (servora.conf.v1.section) = { key: "mail", optional: true };

  Smtp smtp = 1;
  MailFrom from = 2;
  string base_url = 3;
  string template_dir = 5;
  google.protobuf.Duration verify_email_ttl = 6;
  google.protobuf.Duration reset_password_ttl = 7;
}

message Smtp {
  string host = 1;
  int32 port = 2;
  string username = 3;
  string password = 4;
  bool tls = 5;
  bool skip_verify_ssl = 6;
  google.protobuf.Duration send_timeout = 7;
}

message MailFrom {
  string address = 1;
  string name = 2;
}
