syntax = "proto3";

package servora.transport.http.cors.v1;

import "google/protobuf/duration.proto";
import "servora/conf/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/transport/http/cors/v1;corsv1";

message CORS {
  option (servora.conf.v1.section) = {
    key: "cors"
    optional: true
  };

  bool enable = 1;
  repeated string allowed_origins = 2 [(servora.conf.v1.field) = {default: "*"}];
  repeated string allowed_methods = 3 [(servora.conf.v1.field) = {default: "GET,POST,PUT,DELETE,OPTIONS"}];
  repeated string allowed_headers = 4 [(servora.conf.v1.field) = {default: "Origin,Content-Type,Accept,Authorization"}];
  repeated string exposed_headers = 5;
  bool allow_credentials = 6;
  google.protobuf.Duration max_age = 7 [(servora.conf.v1.field) = {default: "24h"}];
}
