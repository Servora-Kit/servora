syntax = "proto3";

package servora.contrib.db.redis.v1;

import "google/protobuf/duration.proto";
import "servora/conf/v1/annotations.proto";

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/contrib/db/redis/v1;redispb";

message Redis {
  option (servora.conf.v1.section) = {
    key: "redis"
    optional: true
  };

  string network = 1;
  string addr = 2;
  string user_name = 3;
  string password = 4;
  int32 db = 5;
  google.protobuf.Duration dial_timeout = 6;
  google.protobuf.Duration read_timeout = 7;
  google.protobuf.Duration write_timeout = 8;
}
