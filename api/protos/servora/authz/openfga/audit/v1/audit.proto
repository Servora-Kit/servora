syntax = "proto3";

package servora.authz.openfga.audit.v1;

option go_package = "github.com/Servora-Kit/servora/api/gen/go/servora/authz/openfga/audit/v1;openfgaauditpb";

// TupleMutation is the CloudEvents data payload for
// servora.authz.openfga.tuple_mutation.v1 events. It records OpenFGA tuple
// write or delete operations. The CloudEvents subject MUST be set to
// "openfga/store/{store_id}"; individual tuples are listed here in data.
message TupleMutation {
  // Operation identifies whether tuples were written or deleted.
  enum Operation {
    OPERATION_UNSPECIFIED = 0;
    OPERATION_WRITE       = 1;
    OPERATION_DELETE      = 2;
  }

  Operation        operation = 1;
  repeated Tuple   tuples    = 2;
  string           store_id  = 3;
  string           model_id  = 4;
}

// Tuple represents a single OpenFGA relationship tuple.
message Tuple {
  string user     = 1;
  string relation = 2;
  string object   = 3;
}
