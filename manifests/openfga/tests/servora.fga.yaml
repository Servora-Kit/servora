name: servora authorization model tests
model_file: ../model/servora.fga

tuples:
  # Platform admin
  - user: user:platform-admin
    relation: admin
    object: platform:default

  # Tenant setup (platform:default linked for inheritance chain)
  - user: platform:default
    relation: platform
    object: tenant:root

  - user: user:tenant-owner
    relation: owner
    object: tenant:root

  # Organization setup
  - user: tenant:root
    relation: tenant
    object: organization:acme

  - user: user:org-admin
    relation: admin
    object: organization:acme

  - user: user:org-member
    relation: member
    object: organization:acme

tests:
  # --- Platform tests ---

  - name: platform admin can manage all tenants
    check:
      - user: user:platform-admin
        object: platform:default
        assertions:
          admin: true
          can_view_all_tenants: true
          can_manage_all_tenants: true

  - name: tenant owner has no platform admin permission
    check:
      - user: user:tenant-owner
        object: platform:default
        assertions:
          admin: false
          can_view_all_tenants: false
          can_manage_all_tenants: false

  # --- Tenant tests ---

  - name: tenant owner can view manage and transfer
    check:
      - user: user:tenant-owner
        object: tenant:root
        assertions:
          owner: true
          effective_admin: true
          can_view: true
          can_manage: true
          can_transfer_ownership: true

  - name: platform admin inherits tenant effective_admin via inheritance chain
    check:
      - user: user:platform-admin
        object: tenant:root
        assertions:
          owner: false
          effective_admin: true
          can_view: true
          can_manage: true
          can_transfer_ownership: true

  - name: org member has no direct tenant permissions
    check:
      - user: user:org-member
        object: tenant:root
        assertions:
          owner: false
          effective_admin: false
          can_view: false
          can_manage: false
          can_transfer_ownership: false

  # --- Organization tests ---

  - name: org admin can manage org and members
    check:
      - user: user:org-admin
        object: organization:acme
        assertions:
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true

  - name: org member can view but not manage
    check:
      - user: user:org-member
        object: organization:acme
        assertions:
          admin: false
          member: true
          can_view: true
          can_manage: false
          can_manage_members: false

  - name: tenant owner inherits org admin via effective_admin
    check:
      - user: user:tenant-owner
        object: organization:acme
        assertions:
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true

  - name: platform admin inherits org admin via full inheritance chain
    check:
      - user: user:platform-admin
        object: organization:acme
        assertions:
          admin: true
          member: true
          can_view: true
          can_manage: true
          can_manage_members: true

  - name: unrelated user has no org permissions
    check:
      - user: user:tenant-owner
        object: organization:other
        assertions:
          admin: false
          member: false
          can_view: false
          can_manage: false
          can_manage_members: false
