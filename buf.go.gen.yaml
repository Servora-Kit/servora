version: v2

# 不在此处启用 clean，避免每次 make gen 都重写整个 api/gen/go。
# 日常增量生成使用 `make gen`；当删除/重命名 proto 或移除 plugin 时，
# 使用 `make gen.fresh` 显式触发 clean + regenerate。

managed:
    enabled: true

    disable:
        # --- 第三方模块：完全不托管，保留上游 go_package ---
        - module: buf.build/googleapis/googleapis
        - module: buf.build/bufbuild/protovalidate
        - module: buf.build/kratos/apis
        - module: buf.build/gnostic/gnostic
        - module: buf.build/gogo/protobuf
        - module: buf.build/menta2k-org/redact

        # --- 本仓库 go_package 例外：保留 proto 里手写的自定义别名 ---
        - file_option: go_package
          path: servora/conf/v1/conf.proto

plugins:
    # generate go struct code
    - local: protoc-gen-go
      out: api/gen/go
      opt: paths=source_relative

    # generate grpc service code
    - local: protoc-gen-go-grpc
      out: api/gen/go
      opt: paths=source_relative

    # generate kratos http service code
    - local: protoc-gen-go-http
      out: api/gen/go
      opt: paths=source_relative

    # generate kratos errors code
    - local: protoc-gen-go-errors
      out: api/gen/go
      opt: paths=source_relative

    # generate message validator code
    - local: protoc-gen-validate
      out: api/gen/go
      opt:
          - paths=source_relative
          - lang=go

    # generate redact code (field-level log redaction)
    - local: protoc-gen-redact
      out: api/gen/go
      opt:
          - paths=source_relative
          - lang=go

    # ==================== Servora custom plugins ====================

    # generate authz rules from proto annotations
    - local: protoc-gen-servora-authz
      out: api/gen/go
      opt: paths=source_relative

    # generate mapper plans from proto annotations
    - local: protoc-gen-servora-mapper
      out: api/gen/go
      opt: paths=source_relative

    # generate audit rules from proto annotations
    - local: protoc-gen-servora-audit
      out: api/gen/go
      opt: paths=source_relative

    # generate authn rules from proto annotations
    - local: protoc-gen-servora-authn
      out: api/gen/go
      opt: paths=source_relative

    # generate conf SectionKey/ApplyDefaults/CheckRequired/ApplyConf from proto annotations
    - local: protoc-gen-servora-conf
      out: api/gen/go
      opt: paths=source_relative
