version: v2

modules:
  - path: api/protos
    name: buf.build/servora/servora

deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis

breaking:
  use:
    - FILE

lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
  ignore_only:
    RPC_RESPONSE_STANDARD_NAME:
      - api/protos/servora/example/v1/example.proto
